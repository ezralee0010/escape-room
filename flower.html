<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
  /* global nn */

  const emojis = '𝄞 𝄢 𝅝 𝅗𝅥 ♩ ♪ ♫ ♬ ♭ ♮ ♯ 𝅗𝅥 ♩ ♪ ♫ ♬'

  const sounds = [ './sounds/a4.mp3', './sounds/a#4.mp3', './sounds/b4.mp3', './sounds/c5.mp3', './sounds/c4.mp3', './sounds/c#4.mp3', './sounds/d4.mp3', './sounds/d#4.mp3', './sounds/e4.mp3', './sounds/f4.mp3', './sounds/f#4.mp3', './sounds/g4.mp3', './sounds/g#4.mp3' ]

  function playRandomSound() {
    const randomSound = nn.random(sounds)
    const audio = new Audio(randomSound)
    audio.volume = 0.3

    audio.play()
  }

  function draw () {
    if (!nn.mouseDown) return

    const x = nn.mouseX
    const y = nn.mouseY

    const emoji = nn.random(emojis)

    playRandomSound()

    nn.create('a-box')
      .content(emoji)
      .css('user-select', 'none')
      .css('color', 'black')
      .css('font-size', '30px')
      .position(x, y)
      .css('animation', 'floatNotes 3s ease-in-out infinite')
      .addTo('body')
  }

  nn.on('mousemove', draw)
</script>
