<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>

<script>
  /* global nn */

  // FLOATING ANIMATION
  const style = document.createElement('style')

  style.innerHTML = `
    @keyframes floatNotes {
      0% {
        transform: translate(0px, 0px);
      }

      50% {
        transform: translate(0px, -10px);
      }

      100% {
        transform: translate(0px, 0px);
      }
    }
  `

  document.head.appendChild(style)

  // MUSICAL SYMBOLS
  const emojis =
    '𝄞 𝅝 𝅗𝅥 𝅘𝅥 𝅘𝅥𝅮 𝅘𝅥𝅯 𝅘𝅥𝅰 𝅘𝅥𝅱 𝅘𝅥𝅲 𝅝 𝅗𝅥 𝅘𝅥 𝅝 𝅗𝅥 𝅘𝅥'

  // SOUND FILES
  const sounds = [
    'a3.mp3',
    'b5.mp3',
    'c4.mp3',
    'd5.mp3',
    'e5.mp3',
    'f3.mp3',
    'g5.mp3'
  ]

  // PLAY RANDOM SOUND
  function playRandomSound() {

    const randomSound = nn.random(sounds)

    const audio = new Audio(randomSound)

    audio.volume = 0.3

    audio.play()
  }

  // DRAW MUSIC NOTES
  function draw () {

    if (!nn.mouseDown) return

    const x = nn.mouseX
    const y = nn.mouseY

    const emoji = nn.random(emojis)

    // PLAY SOUND
    playRandomSound()

    // CREATE NOTE
    nn.create('a-box')
      .content(emoji)
      .css('user-select', 'none')
      .css('color', 'black')
      .css('font-size', '30px')
      .position(x, y)
      .css('animation', 'floatNotes 3s ease-in-out infinite')
      .addTo('body')
  }

  nn.on('mousemove', draw)
</script>
