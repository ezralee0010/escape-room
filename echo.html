<style>
  body { 
    background: url('./images/lost.jpg'); position: relative;
    overflow: hidden; background-repeat: no-repeat; background-size: cover; background-position: center;
  }
  
  #door { position: absolute; width: 100px; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 1 }

<body>
  <h1 style="margin: 10px"> The 🙀🚀-phizing: jumping to the worst possible conclusions (in the mind)</h1>
  <a href="index.html"> <img id="door" src="./images/door.png" alt="door"> </a>
</body>

<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
  /* global nn */

  let canvas
  let sentences = []

  class Sentence {
    constructor(x, y, dx, dy, text) {
      this.x = x
      this.y = y
      this.dx = dx
      this.dy = dy
      this.text = text
    }

    update() {
      this.x += this.dx
      this.y += this.dy
      
      const textWidth = canvas.ctx.measureText(this.text).width

      if (this.x + textWidth > nn.width || this.x < 0) {
        this.dx = -this.dx
      }

      if (this.y > nn.height - document.getElementById('nav').offsetHeight || this.y - 20 < 0) {
        this.dy = -this.dy
      }
    }

    draw() {
      canvas.ctx.fillStyle = nn.randomColor()
      canvas.ctx.font = '40px serif'

      canvas.ctx.fillText(this.text, this.x, this.y)
    }
  }

  function setup () {
    nn.get('body').css('margin', 0)

    canvas = nn.create('canvas')
      .position(0, 0)
      .resize(nn.width, nn.height)
      .addTo('body')

    const quote = ['OFF WITH THEIR HEADS', 'I’m late, I’m late I’m late!', 'I shall never get out', 'Who are you?']

    for (let i = 0; i < 20; i++) {
      const word = nn.random(quote)
      canvas.ctx.font = '40px serif'
      const textWidth = canvas.ctx.measureText(word).width

      sentences.push(new Sentence(
        nn.random(0, nn.width - textWidth),
        nn.random(0 + 20, nn.height - document.getElementById('nav').offsetHeight),
        nn.random(-2, 2),
        nn.random(-2, 2),
        word
      ))
    }
  }

  function draw () {
    setTimeout(draw, 1000 / 60)

    sentences.forEach(w => {
      w.update()
      w.draw()
    })
  }

  nn.on('load', setup)
  nn.on('load', draw)
  nn.on('resize', () => {
    canvas.resize(nn.width, nn.height)
  })
</script>
