    position: absolute; width: 100px; left: 50%; top: 50%; 
    transform: translate(-50%, -50%); z-index: 1;
  }

<body>
  <h1 style="color: black"> The &gt;cat&lt;astrophizing </h1>
  <a href="index.html">
    <img id="door" src="./images/door.png" alt="door">
  </a>
</body>

<script>
  /* global nn */

  let canvas
  let words = []

  class Word {
    constructor(x, y, dx, dy, text) {
      this.x = x
      this.y = y
      this.dx = dx
      this.dy = dy
      this.text = text
    }

    update() {
      this.x += this.dx
      this.y += this.dy

      if (this.x > nn.width || this.x < 0) {
        this.dx = -this.dx
      }

      if (this.y > nn.height || this.y < 0) {
        this.dy = -this.dy
      }
    }

    draw() {
      canvas.ctx.fillStyle = nn.randomColor()
      canvas.ctx.font = '40px serif'

      canvas.ctx.fillText(this.text, this.x, this.y)
    }
  }

  function setup () {
    nn.get('body').css('margin', 0)
    nn.get('body').css('background-color', 'white')

    canvas = nn.create('canvas')
      .position(0, 0)
      .resize(nn.width, nn.height)
      .addTo('body')

    const vocab = [
      'OFF WITH THEIR HEADS', 'I’m late, I’m late I’m late!', 'I shall never get out', 'Who are you?'
    ]

    for (let i = 0; i < 10; i++) {
      const word = nn.random(vocab)

      words.push(new Word(
        nn.random(0, nn.width),
        nn.random(0, nn.height),
        nn.random(-2, 2),
        nn.random(-2, 2),
        word
      ))
    }
  }

  function draw () {
    setTimeout(draw, 1000 / 30)

    words.forEach(w => {
      w.update()
      w.draw()
    })
  }

  nn.on('load', setup)
  nn.on('load', draw)

  nn.on('resize', () => {
    canvas.resize(nn.width, nn.height)
  })
</script>
