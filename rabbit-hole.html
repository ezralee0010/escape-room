<script>
  /* global nn */

  const vocab = [
    'вЦА', 'вЦБ', 'вЦВ', 'вЦГ', 'вЦД', 'вЦЕ', 'вЦЖ', 'вЦЗ', 'вЦИ', 'вЦЙ', 'вЦК', 'вЦЛ', 'вЦМ', 'вЦН', 'вЦО', 'вЦП', 'вЦР', 'вЦС', 'вЦТ', 'вЦУ', 'вЦФ', 'вЦХ', 'вЦЦ', 'вЦШ', 'вЦЧ', 'вЦШ', 'вЦЩ', 'вЦЪ', 'вЦЫ', 'вЦЬ', 'вЦЭ', 'вЦЮ', 'вЦЯ', 'вЦА', 'вЦБ', 'вЦВ', 'вЦГ', 'вЦД', 'вЦЕ', 'вЦЖ', 'вЦЗ', 'вЦИ', 'вЦЙ', 'вЦК', 'вЦЛ', 'вЦМ', 'вЦН', 'вЦО', 'вЦП', 'вЦР', 'вЦС', 'вЦТ', 'вЦУ', 'вЦФ', 'вЦХ', 'вЦЦ', 'вЦШ', 'вЦЧ', 'вЦШ', 'вЦЩ', 'вЦЪ', 'вЦЫ', 'вЦЬ', 'вЦЭ', 'вЦЮ', 'вЦЯ', 'I', 'am', 'falling', 'falling', 'fall', 'drop', 'slump', 'below', 'dip', 'sinking', 'descend', 'down', 'down', 'where', 'am', 'I', 'where', 'escape', 'escape', 'escape', 'escape', 'I', 'I', 'I', 'I', 'вЖѓ', 'вЖґ', 'вЖЈ', 'вЖ°', 'вЖІ', 'вЗК', 'вЖі', 'вЗУ', 'вЗШ', 'вЗЩ', 'вЗЯ', 'вЗ£', 'вЗ©', 'вЗ≤', 'вШЗ', 'вШИ', 'вЮШ', 'вЮі', 'вЮЈ', 'в§И', 'в§Л', 'в§У', 'в§•', 'в§¶', 'в§©', 'в§µ', 'в§Є', 'в§є', 'в§Ї', 'в••', 'вђВ', 'вђГ', 'вЃЫ', 'вЃЯ', 'вЃґ', 'вЃЈ', 'вФД', 'вФЕ', 'вФЕ', 'вФЕ', 'вФЖ', 'вФЗ', 'вФД', 'вФЕ', 'вФЕ', 'вФЕ', 'вФЖ', 'вФЗ', 'вХ≠', 'вХ≠', 'вХЃ', 'вХѓ', 'вХ∞']

  function setup () {

    const fps = 1000 / 60
    setTimeout(setup, fps)
    const ran = nn.random(vocab)

    const r = nn.random(255)
    const g = nn.random(255)
    const b = nn.random(255)

    const c = nn.rgb(r, g, b)

    const t = nn.random(60, 90)

    let el

    if (ran === 'escape') {
      el = nn.create('a')
        .content('escape')
        .set('href', 'flower.html')

    } else {
      el = nn.create('a-box')
        .content(ran)
        .css('color', c)
    }

    el
      .css('word-wrap', 'anywhere')
      .css('line-height', '40px')
      .css('font-size', t)
      .addTo('body')

    const y = nn.get('body').scrollHeight

    window.scrollTo(0, y)
  }

  nn.on('load', () => {
    nn.get('body').css('background-color', 'black')
    setup()
  })

</script>
