<script>
  /* global nn */
  
  const vocab = [
    'тЦА', 'тЦБ', 'тЦВ', 'тЦГ', 'тЦД', 'тЦЕ', 'тЦЖ', 'тЦЗ', 'тЦИ', 'тЦЙ', 'тЦК', 'тЦЛ', 'тЦМ', 'тЦН', 'тЦО', 'тЦП', 'тЦР', 'тЦС', 'тЦТ', 'тЦУ', 'тЦФ', 'тЦХ', 'тЦЦ', 'тЦШ', 'тЦЧ', 'тЦШ', 'тЦЩ', 'тЦЪ', 'тЦЫ', 'тЦЬ', 'тЦЭ', 'тЦЮ', 'тЦЯ', 'тЦА', 'тЦБ', 'тЦВ', 'тЦГ', 'тЦД', 'тЦЕ', 'тЦЖ', 'тЦЗ', 'тЦИ', 'тЦЙ', 'тЦК', 'тЦЛ', 'тЦМ', 'тЦН', 'тЦО', 'тЦП', 'тЦР', 'тЦС', 'тЦТ', 'тЦУ', 'тЦФ', 'тЦХ', 'тЦЦ', 'тЦШ', 'тЦЧ', 'тЦШ', 'тЦЩ', 'тЦЪ', 'тЦЫ', 'тЦЬ', 'тЦЭ', 'тЦЮ', 'тЦЯ', 'I', 'am', 'falling', 'falling', 'fall', 'drop', 'slump', 'below', 'dip', 'sinking', 'descend', 'down', 'down', 'where', 'am', 'I', 'where', 'ЁЯЪк', 'ЁЯЪк', 'ЁЯЪк', 'I', 'I', 'I', 'I', 'тЖп', 'тЖ╢', 'тЖ╖', 'тЖб', 'тЖз', 'тЗК', 'тЖ┤', 'тЗУ', 'тЗШ', 'тЗЩ', 'тЗЯ', 'тЗг', 'тЗй', 'тЗ▓', 'тШЗ', 'тШИ', 'тЮШ', 'тЮ┤', 'тЮ╖', 'тдИ', 'тдЛ', 'тдУ', 'тде', 'тдж', 'тдй', 'тд╡', 'тд╕', 'тд╣', 'тд║', 'тее', 'тмВ', 'тмГ', 'тоЫ', 'тоЯ', 'то╢', 'то╖', 'тФД', 'тФЕ', 'тФЕ', 'тФЕ', 'тФЖ', 'тФЗ', 'тФД', 'тФЕ', 'тФЕ', 'тФЕ', 'тФЖ', 'тФЗ', 'тХн', 'тХн', 'тХо', 'тХп', 'тХ░']

  function setup () {
    const fps = 1000 / 60
    setTimeout(setup, fps)
    const ran = nn.random(vocab)

    const r = nn.random(255)
    const g = nn.random(255)
    const b = nn.random(255)

    const c = nn.rgb(r, g, b)
    const t = nn.random(60, 90)

    let el

    if (ran === 'ЁЯЪк') {
      el = nn.create('a')
        .content('ЁЯЪк')
        .set('href', 'flower.html')

    } else {
      el = nn.create('a-box')
        .content(ran)
        .css('color', c)
    }

    el
      .css('word-wrap', 'anywhere')
      .css('line-height', '40px')
      .css('font-size', t)
      .addTo('body')

    const y = nn.get('body').scrollHeight
    window.scrollTo(0, y)
  }

  nn.on('load', () => {
    nn.get('body').css('background-color', 'black')
    setup()
  })
</script>
